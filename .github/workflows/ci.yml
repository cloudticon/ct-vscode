name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run compile

      - name: Package VSIX
        run: npx vsce package --allow-missing-repository --pre-release

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudticon-ct-vsix
          path: "*.vsix"
